name: Reproducible Build

# R12-Phase-D / item #7: heavy reproducible-build verification.
#
# Builds each release target inside the same pinned container on two
# distinct Ubuntu runners, then asserts byte-identical sha256 per target
# distro. The build is fully hermetic:
#
#   * SOURCE_DATE_EPOCH = commit time (HEAD's authordate, seconds-
#     since-epoch). Pins the embedded build timestamp so the rustc
#     output doesn't drift across runs.
#   * `cargo build --frozen --locked` against the committed `vendor/`
#     directory + `.cargo/config.toml`. No network access; no
#     registry-cache variance; the source tree is the SOLE input.
#   * Matrix over pinned release containers to verify the distro-specific
#     artifacts that are actually published.
#   * Matrix over `ubuntu-22.04` + `ubuntu-24.04` host runners to catch
#     accidental dependence on the outer runner while keeping linker /
#     glibc / CRT inputs fixed by the container digest.
#
# A divergence between the two runners for the SAME container digest is a
# hard FAIL — it means that target's binary is non-reproducible and a
# third party cannot independently verify the released bytes. Different
# target distros are NOT compared against each other; their linker and
# libc inputs are intentionally different.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: reprobuild-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: yubihsm-share-converter

jobs:
  build:
    name: Reproducible build (${{ matrix.distro }} on ${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
            distro: ubuntu-22.04
            container: "ubuntu@sha256:962f6cadeae0ea6284001009daa4cc9a8c37e75d1f5191cf0eb83fe565b63dd7"
          - runner: ubuntu-24.04
            distro: ubuntu-22.04
            container: "ubuntu@sha256:962f6cadeae0ea6284001009daa4cc9a8c37e75d1f5191cf0eb83fe565b63dd7"
          - runner: ubuntu-22.04
            distro: ubuntu-24.04
            container: "ubuntu@sha256:c4a8d5503dfb2a3eb8ab5f807da5bc69a85730fb49b5cfca2330194ebcc41c7b"
          - runner: ubuntu-24.04
            distro: ubuntu-24.04
            container: "ubuntu@sha256:c4a8d5503dfb2a3eb8ab5f807da5bc69a85730fb49b5cfca2330194ebcc41c7b"
          - runner: ubuntu-22.04
            distro: debian-13
            container: "debian@sha256:e2d08da6f42ef4b09b165d55528a12727aeed8240dc9edf888e3ec07e10ef9da"
          - runner: ubuntu-24.04
            distro: debian-13
            container: "debian@sha256:e2d08da6f42ef4b09b165d55528a12727aeed8240dc9edf888e3ec07e10ef9da"
      fail-fast: false
    container: ${{ matrix.container }}
    timeout-minutes: 30
    steps:
      - name: Install build prerequisites
        run: |
          set -e
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            curl ca-certificates build-essential pkg-config git

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install rustup (per-run sha256 verification)
        env:
          TOOLCHAIN: stable
        run: |
          set -e
          # Sidecar pattern (mirrors ci.yml): download rustup-init AND
          # its sha256 sidecar from the same canonical origin, verify
          # before exec.
          if command -v rustup >/dev/null 2>&1; then
            rustup self uninstall -y || true
          fi
          curl --proto '=https' --tlsv1.2 -fsSLo rustup-init \
            https://static.rust-lang.org/rustup/dist/x86_64-unknown-linux-gnu/rustup-init
          curl --proto '=https' --tlsv1.2 -fsSLo rustup-init.sha256 \
            https://static.rust-lang.org/rustup/dist/x86_64-unknown-linux-gnu/rustup-init.sha256
          expected="$(cut -d ' ' -f1 rustup-init.sha256)"
          actual="$(sha256sum rustup-init | cut -d ' ' -f1)"
          test "$actual" = "$expected"
          chmod +x rustup-init
          ./rustup-init -y --profile minimal --default-toolchain "$TOOLCHAIN"
          rm -f rustup-init rustup-init.sha256
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Pin SOURCE_DATE_EPOCH from HEAD commit time
        run: |
          set -e
          # `git log -1 --format=%ct HEAD` returns the commit timestamp
          # in seconds-since-epoch (UTC). Capturing it once and exporting
          # via GITHUB_ENV makes it visible to every subsequent step,
          # including the cargo build.
          sde="$(git log -1 --format=%ct HEAD)"
          echo "SOURCE_DATE_EPOCH=$sde" >> "$GITHUB_ENV"
          echo "Pinned SOURCE_DATE_EPOCH=$sde"
      - name: Build (release, frozen, locked, vendored)
        run: |
          set -e
          # --frozen: assert Cargo.lock is up-to-date with Cargo.toml
          #           (refuse to update); equivalent to --locked
          #           --offline. With the committed vendor/ directory
          #           in place, the build has no network access.
          # --locked: assert Cargo.lock is honoured; refuse to update
          #          even if a newer compatible version is available.
          cargo build --release --locked --frozen --bin "$BIN_NAME"
      - name: Compute sha256 of release binary
        run: |
          set -e
          sha256sum "target/release/$BIN_NAME" > "sha256-${{ matrix.distro }}-${{ matrix.runner }}.txt"
          cat "sha256-${{ matrix.distro }}-${{ matrix.runner }}.txt"
      - name: Upload sha256
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: sha256-${{ matrix.distro }}-${{ matrix.runner }}
          path: sha256-${{ matrix.distro }}-${{ matrix.runner }}.txt
          retention-days: 30

  compare:
    name: Compare sha256 per distro across runners
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: sha256/
      - name: Diff sha256 files per distro (must match byte-identical)
        run: |
          set -e
          # Each downloaded artifact lands in `sha256/<artifact-name>/`.
          # We compare the bare hex hashes (cut to the first column) so a
          # different file PATH inside the sha256sum output doesn't false-
          # positive a mismatch.
          for distro in ubuntu-22.04 ubuntu-24.04 debian-13; do
            file_22="sha256/sha256-${distro}-ubuntu-22.04/sha256-${distro}-ubuntu-22.04.txt"
            file_24="sha256/sha256-${distro}-ubuntu-24.04/sha256-${distro}-ubuntu-24.04.txt"
            test -f "$file_22"
            test -f "$file_24"
            h22="$(cut -d ' ' -f1 "$file_22")"
            h24="$(cut -d ' ' -f1 "$file_24")"
            echo "${distro} on ubuntu-22.04 runner sha256: $h22"
            echo "${distro} on ubuntu-24.04 runner sha256: $h24"
            if [ "$h22" != "$h24" ]; then
              echo "FAIL: ${distro} release binary is NOT byte-identical across runners" >&2
              exit 1
            fi
          done
          echo "PASS: each release target is byte-identical across runners"
