name: Cryptol proofs

# R13-A / item 1: Machine-checked algebraic property proofs against the
# Cryptol formal model under `spec/`. The workflow loads
# `spec/properties.cry` and runs the CI-safe GF(2^8) algebraic and
# inversion proof subset. Lagrange t=2/t=3 properties remain in the spec
# for offline/manual verification; the pinned Cryptol/Z3 image timed out
# on the first t=2 Lagrange proof at the 30-minute per-proof cap, so those
# obligations are intentionally not part of the default CI gate.
#
# Acceptance posture: workflow exits 0 only if EVERY default :prove returns
# Q.E.D. Counterexamples, errors, or solver
# time-outs fail the job hard. Per R13-v2 M2 the per-`:prove` safety
# net `:set prover-timeout = 1800` caps any single property at 30 min
# so an unexpected solver hang fails fast rather than starving the
# 30-min container budget.
#
# R13-F refactor: the pinned Cryptol Docker image digest is sourced from
# `.github/workflows/proof-digests.env` (single source of truth shared
# with `.github/workflows/saw-proofs.yml` AND the local-run wrapper
# `scripts/run-proofs.sh`). The job-level `container:` key was dropped
# because GitHub Actions evaluates `container.image` BEFORE step
# expressions resolve; we run Cryptol via an explicit `docker run` in a
# step that has access to the sourced env file.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # SD-R13-3: Sunday 06:00 UTC. Non-blocking against the push/PR lanes
    # — the cron run validates the GHCR image is still resolvable and
    # the digest still pulls. If the digest disappears (image deletion
    # / GHCR rotation), the cron run fails loudly and the maintainer
    # rotates per the proof-digests.env single-source-of-truth (Phase F).
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cryptol-proofs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cryptol-proofs:
    name: Cryptol CI-safe :prove
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Read pinned image digest from single source of truth
        id: digests
        # R13-F / item 6: load CRYPTOL_IMAGE from the committed
        # `.github/workflows/proof-digests.env` file. The same env file
        # is consumed by saw-proofs.yml AND scripts/run-proofs.sh so a
        # single rotation PR updates all three call sites simultaneously.
        # Rotation: when a new Cryptol release ships, capture the new
        # digest via the curl recipe documented in saw/MAINTENANCE.md
        # and update proof-digests.env in a dedicated PR. The current
        # pin is Cryptol 3.5.0 (released 2026-01-28); the digest below
        # is the linux/amd64 manifest digest captured against ghcr.io
        # on 2026-05-12.
        run: |
          set -e
          set -a
          # shellcheck disable=SC1091
          source .github/workflows/proof-digests.env
          set +a
          if [ -z "${CRYPTOL_IMAGE:-}" ]; then
            echo "FATAL: CRYPTOL_IMAGE not set after sourcing proof-digests.env" >&2
            exit 1
          fi
          echo "image=${CRYPTOL_IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "Pinned Cryptol image: ${CRYPTOL_IMAGE}"

      - name: Pull pinned Cryptol image
        run: |
          set -e
          docker pull "${{ steps.digests.outputs.image }}"

      - name: Verify Cryptol + Z3 are available inside the container
        run: |
          set -e
          docker run --rm "${{ steps.digests.outputs.image }}" --version || true
          if ! docker run --rm --entrypoint sh "${{ steps.digests.outputs.image }}" -c 'command -v cryptol >/dev/null 2>&1'; then
            echo "FATAL: cryptol binary not found inside the pinned container." >&2
            exit 1
          fi
          # Cryptol bundles a usable z3; sanity-print so the workflow
          # logs name the SMT backend version that discharged the proofs.
          docker run --rm --entrypoint z3 "${{ steps.digests.outputs.image }}" --version || true

      - name: Run CI-safe :prove directives
        id: run_proofs
        # The CRYPTOLPATH env var tells Cryptol where to find module
        # files. We pass the repo root so `import spec::gf256` etc.
        # resolves against ./spec/gf256.cry as documented in the
        # Cryptol Modules.html reference.
        run: |
          set -e
          cd "${GITHUB_WORKSPACE:-$PWD}"
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work" -w /work \
            -e CRYPTOLPATH=/work \
            "${{ steps.digests.outputs.image }}" \
            -c ':set prover=z3' \
            -c ':set prover-timeout = 1800' \
            -c ':load spec/properties.cry' \
            -c ':prove mul_legacy_commutative' \
            -c ':prove mul_legacy_identity_one' \
            -c ':prove mul_legacy_annihilator_zero' \
            -c ':prove mul_legacy_distributes_xor' \
            -c ':prove mul_aes_commutative' \
            -c ':prove mul_aes_identity_one' \
            -c ':prove mul_aes_annihilator_zero' \
            -c ':prove mul_aes_distributes_xor' \
            -c ':prove mul_aes_fips197_first_pair' \
            -c ':prove mul_aes_fips197_second_pair' \
            -c ':prove mul_legacy_pin_0x57_0x83' \
            -c ':prove mul_legacy_pin_0x80_2' \
            -c ':prove cross_poly_distinguisher' \
            -c ':prove inv_legacy_round_trip' \
            -c ':prove inv_aes_round_trip' \
            -c ':prove inv_legacy_involution' \
            -c ':prove inv_aes_involution' \
            -c ':prove mul_aes_associative' \
            -c ':prove mul_legacy_associative' \
            -c ':prove mul_aes_fips197_self_square' \
            -c ':prove mul_aes_inv_pin_0x53_0xca' \
            -c ':prove mul_aes_reduction_anchor' \
            -c ':prove xtimes_aes_correct' \
            -c ':prove xtimes_legacy_correct' \
            -c ':prove zero_product_aes' \
            -c ':prove inv_aes_homomorphism' \
            | tee proof.log

      - name: Verify all proofs returned Q.E.D.
        run: |
          set -e
          # Failure modes:
          #   * "Counterexample" — a :prove found a witnessing input that
          #     falsifies the property. Hard failure.
          #   * "failed", "error", "Timed out" — solver-side failure.
          #     Hard failure (the 1800s safety net inside Cryptol caps
          #     each :prove at 30 min, so any "Timed out" line is a
          #     deliberate signal that the property is solver-intractable
          #     at the current container budget).
          #
          # Success mode:
          #   * "Q.E.D." — :prove discharged with no counterexample.
          if grep -E '^Counterexample' proof.log >/dev/null 2>&1; then
            echo "FATAL: at least one :prove found a counterexample." >&2
            grep -E '^Counterexample' proof.log >&2
            exit 1
          fi
          if grep -Ei '(^|[[:space:]])(failed|error|timed out)([[:space:]]|$)' proof.log >/dev/null 2>&1; then
            echo "FATAL: solver-side error / timeout in proof.log." >&2
            grep -Ei '(^|[[:space:]])(failed|error|timed out)([[:space:]]|$)' proof.log >&2
            exit 1
          fi
          # Count successful Q.E.D. lines. Each :prove prints one Q.E.D.
          successes=$(grep -cE '^Q\.E\.D\.' proof.log || true)
          echo "Successful :prove lines: $successes"
          # We sent 26 :prove directives. Cryptol emits one Q.E.D. line
          # per successful directive. The gate is ≥ 26; greater counts
          # indicate the directive list expanded
          # without the gate being updated.
          if [ "$successes" -lt 26 ]; then
            echo "FATAL: expected at least 26 success lines, got $successes." >&2
            exit 1
          fi
          echo "OK: $successes success lines (≥ 26)."

      - name: Post results to step summary
        if: ${{ always() }}
        run: |
          {
            echo "## Cryptol proof results"
            echo ""
            echo "Image: \`${{ steps.digests.outputs.image }}\` (Cryptol 3.5.0; sourced from .github/workflows/proof-digests.env)"
            echo ""
            echo "### Success lines"
            echo ""
            echo '```'
            grep -E '^Q\.E\.D\.' proof.log || echo '(none — see above for failure mode)'
            echo '```'
            echo ""
            echo "### Counterexamples (must be empty)"
            echo ""
            echo '```'
            grep -E '^Counterexample' proof.log || echo '(none)'
            echo '```'
            echo ""
            echo "### Tail of proof.log"
            echo ""
            echo '```'
            tail -n 40 proof.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload proof.log as artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cryptol-proof-log
          path: proof.log
          if-no-files-found: warn
          retention-days: 14
